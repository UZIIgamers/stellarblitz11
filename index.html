<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
canvas{display:block;cursor:none;}
</style>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
const W=cv.width=Math.min(window.innerWidth,780);
const H=cv.height=Math.min(window.innerHeight,480);

let state='start',score=0,hi=0,lives=3,lv=1,fr=0;
let bullets=[],eBullets=[],enemies=[],rocks=[],drops=[],sparks=[];
let sCd=0,eSpawn=80,rSpawn=120;

const stars=Array.from({length:180},()=>({
  x:Math.random()*W,y:Math.random()*H,
  r:Math.random()*1.8,s:0.5+Math.random()*3
}));

let p={x:90,y:H/2,ty:H/2,shield:false,shT:0,rapid:false,rpT:0,inv:false,inT:0};

function rnd(a,b){return a+Math.random()*(b-a);}
function dist(a,b,c,d){return Math.hypot(a-c,b-d);}
function hitBox(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function circHit(cx2,cy2,cr,rx,ry,rw,rh){
  let nx=Math.max(rx,Math.min(cx2,rx+rw)),ny=Math.max(ry,Math.min(cy2,ry+rh));
  return Math.hypot(cx2-nx,cy2-ny)<cr;
}

function spark(x,y,col,n){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,s=1+Math.random()*5;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:20+Math.random()*30,ml:50,r:1+Math.random()*3,c:col});
  }
}

function spawnEnemy(){
  let t=Math.random()<0.75?'f':'h';
  enemies.push({
    x:W+30,y:rnd(40,H-40),w:t==='h'?46:34,h:t==='h'?28:22,
    hp:t==='h'?3:1,sp:t==='h'?1.8:2+lv*.3,type:t,
    sT:rnd(60,120),wb:Math.random()*Math.PI*2
  });
}

function spawnRock(){
  let r=rnd(20,36);
  rocks.push({x:W+r,y:rnd(r,H-r),r,sp:rnd(1.5,2.5+lv*.2),rot:0,rs:(Math.random()-.5)*.06});
}

function tryDrop(x,y){
  if(Math.random()>.4)return;
  let t=['s','r','b','h'][Math.floor(Math.random()*4)];
  drops.push({x,y,type:t,r:13,vy:(Math.random()-.5)*.8});
}

function bomb(){
  enemies.forEach(e=>{score+=(e.type==='h'?30:10);spark(e.x,e.y,'#ff8800',14);tryDrop(e.x,e.y);});
  enemyBullets=[];enemies=[];
}

function loseLife(){
  if(p.shield){p.shield=false;p.shT=0;spark(p.x,p.y,'#00ccff',18);return;}
  lives--;p.inv=true;p.inT=120;spark(p.x,p.y,'#ff2200',22);
  if(lives<=0){state='over';hi=Math.max(hi,score);}
}

function reset(){
  state='play';score=0;lives=3;lv=1;fr=0;
  p={x:90,y:H/2,ty:H/2,shield:false,shT:0,rapid:false,rpT:0,inv:false,inT:0};
  bullets=[];eBullets=[];enemies=[];rocks=[];drops=[];sparks=[];
  sCd=0;eSpawn=80;rSpawn=120;
}

function update(){
  fr++;
  stars.forEach(s=>{s.x-=s.s;if(s.x<0){s.x=W;s.y=Math.random()*H;}});
  if(state!=='play')return;

  lv=1+Math.floor(score/600);
  p.y+=(p.ty-p.y)*.14;
  p.y=Math.max(18,Math.min(H-18,p.y));

  if(p.shield){p.shT--;if(p.shT<=0)p.shield=false;}
  if(p.rapid){p.rpT--;if(p.rpT<=0)p.rapid=false;}
  if(p.inv){p.inT--;if(p.inT<=0)p.inv=false;}

  sCd--;
  if(sCd<=0){
    let fr2=p.rapid?7:16;
    bullets.push({x:p.x+28,y:p.y,s:11});
    if(p.rapid){
      bullets.push({x:p.x+22,y:p.y-9,s:11});
      bullets.push({x:p.x+22,y:p.y+9,s:11});
    }
    sCd=fr2;
  }

  eSpawn--;
  if(eSpawn<=0){
    let n=Math.min(4,1+Math.floor(lv/2));
    for(let i=0;i<n;i++)spawnEnemy();
    eSpawn=Math.max(38,100-lv*9);
  }

  rSpawn--;
  if(rSpawn<=0){spawnRock();rSpawn=Math.max(70,180-lv*10);}

  bullets=bullets.filter(b=>b.x<W+20);
  bullets.forEach(b=>b.x+=b.s);

  eBullets=eBullets.filter(b=>b.x>-20&&b.y>-20&&b.y<H+20);
  eBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});

  enemies.forEach(e=>{
    e.x-=e.sp;
    e.y+=Math.sin(fr*.05+e.wb)*1.3;
    e.sT--;
    if(e.sT<=0){
      let dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy),s=3.5;
      eBullets.push({x:e.x-10,y:e.y,vx:dx/d*s,vy:dy/d*s});
      e.sT=rnd(70,110);
    }
  });
  enemies=enemies.filter(e=>e.x>-60);

  rocks.forEach(a=>{a.x-=a.sp;a.rot+=a.rs;});
  rocks=rocks.filter(a=>a.x>-60);

  drops.forEach(d=>{d.x-=1.5;d.y+=d.vy;});
  drops=drops.filter(d=>d.x>-30);

  sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vx*=.93;s.vy*=.93;s.l--;});
  sparks=sparks.filter(s=>s.l>0);

  if(fr%30===0)score++;

  // bullet-enemy
  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i],hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      let e=enemies[j];
      if(hitBox(b.x-2,b.y-2,14,4,e.x-e.w/2,e.y-e.h/2,e.w,e.h)){
        bullets.splice(i,1);e.hp--;spark(e.x,e.y,'#ff6600',4);hit=true;
        if(e.hp<=0){score+=(e.type==='h'?30:10);spark(e.x,e.y,'#ff8800',14);tryDrop(e.x,e.y);enemies.splice(j,1);}
        break;
      }
    }
  }

  // player-enemy
  if(!p.inv){
    for(let j=enemies.length-1;j>=0;j--){
      let e=enemies[j];
      if(hitBox(p.x-22,p.y-12,44,24,e.x-e.w/2,e.y-e.h/2,e.w,e.h)){
        loseLife();spark(e.x,e.y,'#ff4400',14);enemies.splice(j,1);break;
      }
    }
  }

  // player-rock
  if(!p.inv){
    for(let j=rocks.length-1;j>=0;j--){
      let a=rocks[j];
      if(circHit(a.x,a.y,a.r*.78,p.x-22,p.y-13,44,26)){
        loseLife();spark(a.x,a.y,'#888899',14);rocks.splice(j,1);break;
      }
    }
  }

  // player-ebullet
  if(!p.inv){
    for(let i=eBullets.length-1;i>=0;i--){
      let b=eBullets[i];
      if(hitBox(b.x-4,b.y-4,8,8,p.x-22,p.y-13,44,26)){
        loseLife();spark(b.x,b.y,'#ff2200',7);eBullets.splice(i,1);break;
      }
    }
  }

  // drops
  for(let i=drops.length-1;i>=0;i--){
    let d=drops[i];
    if(dist(d.x,d.y,p.x,p.y)<d.r+26){
      if(d.type==='s'){p.shield=true;p.shT=300;}
      else if(d.type==='r'){p.rapid=true;p.rpT=300;}
      else if(d.type==='b')bomb();
      else if(lives<5)lives++;
      spark(d.x,d.y,'#ffffff',10);drops.splice(i,1);
    }
  }
}

function drawShip(){
  cx.save();cx.translate(p.x,p.y);
  if(p.shield){
    cx.beginPath();cx.arc(0,0,40,0,Math.PI*2);
    cx.strokeStyle=`rgba(0,180,255,${.5+.3*Math.sin(fr*.12)})`;
    cx.lineWidth=3;cx.stroke();
  }
  if(p.inv&&Math.floor(fr/5)%2===0){cx.restore();return;}
  // engine trail
  cx.beginPath();cx.moveTo(-18,-5);
  cx.lineTo(-26-Math.random()*9,0);cx.lineTo(-18,5);
  cx.fillStyle=`rgba(255,${130+Math.random()*60},0,.85)`;cx.fill();
  // hull
  cx.beginPath();cx.moveTo(28,0);cx.lineTo(-10,-13);cx.lineTo(-20,-6);cx.lineTo(-20,6);cx.lineTo(-10,13);cx.closePath();
  cx.fillStyle='#0d2a5c';cx.fill();cx.strokeStyle='#3377ee';cx.lineWidth=1.5;cx.stroke();
  // cockpit
  cx.beginPath();cx.ellipse(8,0,11,6,0,0,Math.PI*2);cx.fillStyle='#66aaee';cx.fill();
  cx.restore();
}

function drawEnemy(e){
  cx.save();cx.translate(e.x,e.y);
  if(e.type==='h'){
    cx.beginPath();cx.moveTo(-23,0);cx.lineTo(8,-15);cx.lineTo(22,0);cx.lineTo(8,15);cx.closePath();
    cx.fillStyle='#3a0000';cx.fill();cx.strokeStyle='#dd3300';cx.lineWidth=2;cx.stroke();
    for(let i=0;i<e.hp;i++){cx.fillStyle='#ff4400';cx.fillRect(-9+i*9,-22,7,3);}
  }else{
    cx.beginPath();cx.moveTo(-16,0);cx.lineTo(5,-10);cx.lineTo(14,0);cx.lineTo(5,10);cx.closePath();
    cx.fillStyle='#2a0808';cx.fill();cx.strokeStyle='#ff2200';cx.lineWidth=1.5;cx.stroke();
  }
  cx.beginPath();cx.ellipse(-2,0,7,4,0,0,Math.PI*2);cx.fillStyle='#ff5533';cx.fill();
  cx.restore();
}

function drawRock(a){
  cx.save();cx.translate(a.x,a.y);cx.rotate(a.rot);
  cx.beginPath();
  for(let i=0;i<9;i++){
    let ang=(i/9)*Math.PI*2,r=a.r*(.68+.32*Math.sin(i*2.5+1));
    i===0?cx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r):cx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
  }
  cx.closePath();cx.fillStyle='#48485a';cx.fill();cx.strokeStyle='#7777aa';cx.lineWidth=1.5;cx.stroke();
  cx.restore();
}

function dropColor(t){return t==='s'?'#00ccff':t==='r'?'#ffee00':t==='b'?'#ff9900':'#44ff99';}
function dropIcon(t){return t==='s'?'S':t==='r'?'R':t==='b'?'B':'+';}

function drawDrop(d){
  cx.save();cx.translate(d.x,d.y);
  let col=dropColor(d.type);
  cx.beginPath();cx.arc(0,0,d.r,0,Math.PI*2);
  cx.fillStyle=col+'44';cx.fill();cx.strokeStyle=col;cx.lineWidth=2;cx.stroke();
  cx.fillStyle='#fff';cx.font='bold 11px Courier New';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(dropIcon(d.type),0,0);
  cx.restore();
}

function drawHUD(){
  cx.fillStyle='#fff';cx.font='bold 16px Courier New';cx.textAlign='left';
  cx.fillText('SCORE: '+score,12,28);
  cx.fillStyle='#8899ff';cx.textAlign='center';
  cx.fillText('LV '+lv,W/2,28);
  cx.fillStyle='#ff4466';cx.textAlign='right';
  cx.fillText('♥'.repeat(lives)+'  ',W-8,28);

  let bx=12,by=H-14;
  if(p.shield){cx.fillStyle='#00ccff';cx.font='13px Courier New';cx.textAlign='left';cx.fillText('S:'+Math.ceil(p.shT/60)+'s',bx,by);bx+=56;}
  if(p.rapid){cx.fillStyle='#ffee00';cx.font='13px Courier New';cx.textAlign='left';cx.fillText('R:'+Math.ceil(p.rpT/60)+'s',bx,by);}
  if(hi>0){cx.textAlign='right';cx.fillStyle='#444466';cx.font='13px Courier New';cx.fillText('BEST:'+hi,W-12,H-14);}
}

function drawBg(){
  cx.fillStyle='#03030f';cx.fillRect(0,0,W,H);
  stars.forEach(s=>{
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${.3+s.s*.1})`;cx.fill();
  });
}

function glow(txt,x,y,col,sz){
  cx.shadowColor=col;cx.shadowBlur=20;
  cx.fillStyle='#fff';cx.font=`bold ${sz}px Courier New`;cx.textAlign='center';
  cx.fillText(txt,x,y);cx.shadowBlur=0;
}

function drawStart(){
  glow('STELLAR BLITZ',W/2,H/2-70,'#3366ff',42);
  cx.fillStyle='#7788cc';cx.font='16px Courier New';cx.textAlign='center';
  cx.fillText('Move mouse / touch to fly',W/2,H/2-10);
  cx.fillText('Auto-fire ON  —  dodge & survive!',W/2,H/2+18);
  cx.fillStyle=`rgba(255,240,80,${.5+.5*Math.sin(fr*.07)})`;
  cx.font='bold 20px Courier New';cx.fillText('CLICK OR TAP TO START',W/2,H/2+75);

  cx.fillStyle='#334466';cx.font='12px Courier New';
  cx.fillText('S = Shield   R = Rapid Fire   B = Bomb   + = Life',W/2,H/2+120);
}

function drawOver(){
  sparks.forEach(s=>{cx.save();cx.globalAlpha=s.l/s.ml;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=s.c;cx.fill();cx.restore();});
  glow('GAME OVER',W/2,H/2-65,'#ff2200',42);
  cx.fillStyle='#ffcc00';cx.font='bold 26px Courier New';cx.textAlign='center';
  cx.fillText('SCORE: '+score,W/2,H/2-15);
  cx.fillStyle='#7777cc';cx.font='18px Courier New';
  cx.fillText('BEST: '+hi,W/2,H/2+20);
  cx.fillStyle=`rgba(255,240,80,${.5+.5*Math.sin(fr*.07)})`;
  cx.font='bold 18px Courier New';cx.fillText('CLICK OR TAP TO PLAY AGAIN',W/2,H/2+78);
}

function draw(){
  drawBg();
  if(state==='start'){drawStart();return;}
  if(state==='over'){drawOver();return;}

  sparks.forEach(s=>{cx.save();cx.globalAlpha=s.l/s.ml;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=s.c;cx.fill();cx.restore();});
  bullets.forEach(b=>{cx.fillStyle='#88ddff';cx.fillRect(b.x,b.y-2,13,4);});
  eBullets.forEach(b=>{cx.beginPath();cx.arc(b.x,b.y,4,0,Math.PI*2);cx.fillStyle='#ff6644';cx.fill();});
  rocks.forEach(drawRock);
  enemies.forEach(drawEnemy);
  drops.forEach(drawDrop);
  drawShip();
  drawHUD();
}

function loop(){update();draw();requestAnimationFrame(loop);}

cv.addEventListener('mousemove',e=>{
  let r=cv.getBoundingClientRect();p.ty=e.clientY-r.top;
});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();let r=cv.getBoundingClientRect();p.ty=e.touches[0].clientY-r.top;
},{passive:false});
cv.addEventListener('click',()=>{if(state!=='play')reset();});
cv.addEventListener('touchstart',e=>{
  e.preventDefault();let r=cv.getBoundingClientRect();p.ty=e.touches[0].clientY-r.top;
  if(state!=='play')reset();
},{passive:false});

loop();
</script>
